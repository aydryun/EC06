services:
  app:
    build: .
    ports:
      - "3000:${PORT}"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started

  db:
    image: postgres:17
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always
    shm_size: 128mb

    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

volumes:
    db_data:
