name: Lint & Test

on:
  pull_request:
    branches: ["dev", "main"]

jobs:
  lint_test:
    runs-on: ubuntu-latest
    environment: dev

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #V7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 #v 4.10

    - name: Copier le fichier d'environnement
      run: cp .env.dist .env

    - name: Set up Docker Compose v2
      uses: hoverkraft-tech/compose-action@11beaa1c2dae4e8ed7b1665aa074723b6cecb0e4 #v 3.0.0
      env:
        POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      with:
        compose-file: "./compose.yml"

    - name: Lint
      run: docker compose run --rm app npm run lint

    - name: Tests
      run: docker compose run --rm app npm test
