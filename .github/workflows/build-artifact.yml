name: Publication de l'artifact

on:
  push:
    branches: [ main ]

jobs:

  archive-build-artifacts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #V7

    - name: Lancement du script de deploiement fictif
      run: |
        sh deploy.sh
        echo "${{ github.sha }}" >> build/deploy.log

    - name: Upload l'artifcat
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
      with: 
        name: Deploiement
        path: build/deploy.log
